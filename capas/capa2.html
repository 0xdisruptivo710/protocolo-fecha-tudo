<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Protocolo Fecha-Tudo - Avant Beauté</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;0,800;0,900;1,400;1,700&family=Jost:wght@300;400;500;600&display=swap');

  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1080px;
    height: 720px;
    margin: 0;
    overflow: hidden;
    background: #0C0A09;
    font-family: 'Jost', sans-serif;
    position: relative;
  }

  /* Vertical gold lines */
  .line-left {
    position: absolute;
    top: 0;
    left: 72px;
    width: 1px;
    height: 100%;
    background: linear-gradient(180deg, transparent 0%, rgba(201, 168, 76, 0.15) 20%, rgba(201, 168, 76, 0.3) 50%, rgba(201, 168, 76, 0.15) 80%, transparent 100%);
  }

  .line-right {
    position: absolute;
    top: 0;
    right: 72px;
    width: 1px;
    height: 100%;
    background: linear-gradient(180deg, transparent 0%, rgba(201, 168, 76, 0.15) 20%, rgba(201, 168, 76, 0.3) 50%, rgba(201, 168, 76, 0.15) 80%, transparent 100%);
  }

  /* Horizontal gold lines */
  .line-top {
    position: absolute;
    top: 56px;
    left: 0;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(201, 168, 76, 0.15) 15%, rgba(201, 168, 76, 0.25) 50%, rgba(201, 168, 76, 0.15) 85%, transparent 100%);
  }

  .line-bottom {
    position: absolute;
    bottom: 56px;
    left: 0;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(201, 168, 76, 0.15) 15%, rgba(201, 168, 76, 0.25) 50%, rgba(201, 168, 76, 0.15) 85%, transparent 100%);
  }

  /* Corner accents */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
  }

  .corner-tl {
    top: 48px;
    left: 64px;
    border-top: 2px solid #C9A84C;
    border-left: 2px solid #C9A84C;
  }

  .corner-tr {
    top: 48px;
    right: 64px;
    border-top: 2px solid #C9A84C;
    border-right: 2px solid #C9A84C;
  }

  .corner-bl {
    bottom: 48px;
    left: 64px;
    border-bottom: 2px solid #C9A84C;
    border-left: 2px solid #C9A84C;
  }

  .corner-br {
    bottom: 48px;
    right: 64px;
    border-bottom: 2px solid #C9A84C;
    border-right: 2px solid #C9A84C;
  }

  /* Dramatic gold accent bar */
  .accent-bar {
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    transform: translateY(-50%);
    background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.05), rgba(201, 168, 76, 0.08), rgba(201, 168, 76, 0.05), transparent);
  }

  /* Subtle noise texture */
  .noise {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0.03;
    background-image:
      repeating-conic-gradient(rgba(255,255,255,0.1) 0% 25%, transparent 0% 50%);
    background-size: 4px 4px;
    pointer-events: none;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 100px;
  }

  /* Top label */
  .label-top {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #C9A84C;
    opacity: 0.7;
    margin-bottom: 44px;
  }

  /* Title group */
  .title-group {
    position: relative;
  }

  .title-line-1 {
    font-family: 'Bodoni Moda', serif;
    font-weight: 900;
    font-size: 72px;
    line-height: 1.0;
    color: #FAFAF9;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .title-line-2 {
    font-family: 'Bodoni Moda', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 68px;
    line-height: 1.1;
    color: #C9A84C;
    letter-spacing: 2px;
    margin-top: -4px;
  }

  /* Gold separator */
  .separator {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin: 36px 0;
  }

  .sep-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C9A84C);
  }

  .sep-line:last-child {
    background: linear-gradient(90deg, #C9A84C, transparent);
  }

  .sep-icon {
    width: 10px;
    height: 10px;
    border: 1px solid #C9A84C;
    transform: rotate(45deg);
  }

  /* Subtitle */
  .subtitle {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 18px;
    color: #FAFAF9;
    letter-spacing: 5px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* Bottom branding */
  .bottom-brand {
    position: absolute;
    bottom: 72px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Jost', sans-serif;
    font-weight: 500;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(201, 168, 76, 0.35);
  }

  /* Subtle gold glow behind title */
  .title-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 200px;
    background: radial-gradient(ellipse, rgba(201, 168, 76, 0.04), transparent 70%);
    pointer-events: none;
  }

  /* Decorative cross marks at edges */
  .cross {
    position: absolute;
    width: 12px;
    height: 12px;
  }

  .cross::before, .cross::after {
    content: '';
    position: absolute;
    background: rgba(201, 168, 76, 0.25);
  }

  .cross::before {
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    transform: translateY(-50%);
  }

  .cross::after {
    top: 0;
    left: 50%;
    width: 1px;
    height: 100%;
    transform: translateX(-50%);
  }

  .cross-1 { top: 52px; left: 68px; }
  .cross-2 { top: 52px; right: 68px; }
  .cross-3 { bottom: 52px; left: 68px; }
  .cross-4 { bottom: 52px; right: 68px; }
</style>
</head>
<body>
  <!-- Structure lines -->
  <div class="line-left"></div>
  <div class="line-right"></div>
  <div class="line-top"></div>
  <div class="line-bottom"></div>

  <!-- Corner accents -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Cross marks -->
  <div class="cross cross-1"></div>
  <div class="cross cross-2"></div>
  <div class="cross cross-3"></div>
  <div class="cross cross-4"></div>

  <!-- Accent bar -->
  <div class="accent-bar"></div>

  <!-- Noise texture -->
  <div class="noise"></div>

  <!-- Gold glow -->
  <div class="title-glow"></div>

  <!-- Content -->
  <div class="content">
    <div class="label-top">WhatsApp Sales Scripts</div>

    <div class="title-group">
      <div class="title-line-1">Protocolo</div>
      <div class="title-line-2">Fecha-Tudo</div>
    </div>

    <div class="separator">
      <div class="sep-line"></div>
      <div class="sep-icon"></div>
      <div class="sep-line"></div>
    </div>

    <p class="subtitle">13 Scripts de Vendas para Esteticistas</p>

    <div class="bottom-brand">Avant Beaut&eacute;</div>
  </div>
</body>
</html>
