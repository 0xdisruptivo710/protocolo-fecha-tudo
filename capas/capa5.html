<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Protocolo Fecha-Tudo - Noir Velvet</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 720px;
    margin: 0;
    overflow: hidden;
    background: #1C1017;
    font-family: 'Montserrat', sans-serif;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Subtle radial glow */
  body::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(212,175,55,0.04) 0%, transparent 70%);
    z-index: 0;
  }

  /* Velvet texture overlay */
  body::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(212,175,55,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(232,180,184,0.03) 0%, transparent 50%);
    z-index: 0;
  }

  /* Gold border frame */
  .frame {
    position: absolute;
    top: 28px; left: 28px; right: 28px; bottom: 28px;
    border: 1px solid rgba(212,175,55,0.25);
    z-index: 1;
  }

  /* Inner frame */
  .frame-inner {
    position: absolute;
    top: 38px; left: 38px; right: 38px; bottom: 38px;
    border: 1px solid rgba(212,175,55,0.1);
    z-index: 1;
  }

  /* Corner ornaments */
  .ornament {
    position: absolute;
    z-index: 2;
  }
  .ornament::before, .ornament::after {
    content: '';
    position: absolute;
    background: #D4AF37;
  }
  /* Top-left */
  .ornament--tl { top: 20px; left: 20px; }
  .ornament--tl::before { width: 40px; height: 1px; top: 0; left: 0; }
  .ornament--tl::after { width: 1px; height: 40px; top: 0; left: 0; }
  /* Top-right */
  .ornament--tr { top: 20px; right: 20px; }
  .ornament--tr::before { width: 40px; height: 1px; top: 0; right: 0; }
  .ornament--tr::after { width: 1px; height: 40px; top: 0; right: 0; }
  /* Bottom-left */
  .ornament--bl { bottom: 20px; left: 20px; }
  .ornament--bl::before { width: 40px; height: 1px; bottom: 0; left: 0; }
  .ornament--bl::after { width: 1px; height: 40px; bottom: 0; left: 0; }
  /* Bottom-right */
  .ornament--br { bottom: 20px; right: 20px; }
  .ornament--br::before { width: 40px; height: 1px; bottom: 0; right: 0; }
  .ornament--br::after { width: 1px; height: 40px; bottom: 0; right: 0; }

  /* Large decorative gold ring - left */
  .ring-left {
    position: absolute;
    left: -80px;
    top: 50%;
    transform: translateY(-50%);
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 1px solid rgba(212,175,55,0.12);
    z-index: 1;
  }
  .ring-left::before {
    content: '';
    position: absolute;
    top: 20px; left: 20px; right: 20px; bottom: 20px;
    border-radius: 50%;
    border: 1px solid rgba(212,175,55,0.07);
  }

  /* Large decorative gold ring - right */
  .ring-right {
    position: absolute;
    right: -60px;
    top: 50%;
    transform: translateY(-50%);
    width: 240px;
    height: 240px;
    border-radius: 50%;
    border: 1px solid rgba(212,175,55,0.1);
    z-index: 1;
  }
  .ring-right::before {
    content: '';
    position: absolute;
    top: 30px; left: 30px; right: 30px; bottom: 30px;
    border-radius: 50%;
    border: 1px solid rgba(232,180,184,0.1);
  }

  /* Diagonal gold lines */
  .diag-line {
    position: absolute;
    z-index: 1;
  }
  .diag-line:nth-child(1) {
    top: 0; right: 180px;
    width: 1px; height: 120px;
    background: linear-gradient(to bottom, transparent, rgba(212,175,55,0.15), transparent);
    transform: rotate(25deg);
    transform-origin: top;
  }
  .diag-line:nth-child(2) {
    bottom: 0; left: 200px;
    width: 1px; height: 100px;
    background: linear-gradient(to top, transparent, rgba(212,175,55,0.12), transparent);
    transform: rotate(-20deg);
    transform-origin: bottom;
  }

  /* Floating gold particles */
  .particle {
    position: absolute;
    border-radius: 50%;
    z-index: 1;
  }
  .particle:nth-child(1) { width: 3px; height: 3px; background: #D4AF37; top: 80px; left: 300px; opacity: 0.3; }
  .particle:nth-child(2) { width: 2px; height: 2px; background: #D4AF37; top: 150px; right: 280px; opacity: 0.4; }
  .particle:nth-child(3) { width: 4px; height: 4px; background: #E8B4B8; bottom: 130px; left: 400px; opacity: 0.2; }
  .particle:nth-child(4) { width: 2px; height: 2px; background: #D4AF37; bottom: 180px; right: 350px; opacity: 0.35; }
  .particle:nth-child(5) { width: 3px; height: 3px; background: #D4AF37; top: 250px; left: 180px; opacity: 0.2; }
  .particle:nth-child(6) { width: 2px; height: 2px; background: #E8B4B8; top: 300px; right: 200px; opacity: 0.25; }

  /* Main content */
  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    max-width: 750px;
  }

  /* Top gold ornamental line */
  .gold-divider-top {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .gold-divider-top::before, .gold-divider-top::after {
    content: '';
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #D4AF37);
  }
  .gold-divider-top::after {
    background: linear-gradient(90deg, #D4AF37, transparent);
  }
  .gold-divider-top span {
    width: 6px; height: 6px;
    border: 1px solid #D4AF37;
    transform: rotate(45deg);
  }

  .label {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #D4AF37;
    margin-bottom: 24px;
    opacity: 0.8;
  }

  .title {
    font-family: 'Cormorant', serif;
    font-size: 68px;
    font-weight: 700;
    color: #FFF8F0;
    line-height: 1.05;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .title em {
    display: block;
    font-style: italic;
    font-size: 72px;
    color: #D4AF37;
    font-weight: 600;
  }

  /* Gold flourish under title */
  .flourish {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 20px 0 28px;
  }
  .flourish::before, .flourish::after {
    content: '';
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,175,55,0.5));
  }
  .flourish::after {
    background: linear-gradient(90deg, rgba(212,175,55,0.5), transparent);
  }
  .flourish span {
    width: 8px; height: 8px;
    background: #D4AF37;
    border-radius: 50%;
    position: relative;
  }
  .flourish span::before, .flourish span::after {
    content: '';
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(212,175,55,0.4);
    border-radius: 50%;
    top: 2px;
  }
  .flourish span::before { left: -14px; }
  .flourish span::after { right: -14px; }

  .subtitle {
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: #FFF8F0;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .subtitle strong {
    color: #E8B4B8;
    font-weight: 500;
  }

  /* Bottom gold ornamental line */
  .gold-divider-bottom {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-top: 36px;
  }
  .gold-divider-bottom::before, .gold-divider-bottom::after {
    content: '';
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #D4AF37);
  }
  .gold-divider-bottom::after {
    background: linear-gradient(90deg, #D4AF37, transparent);
  }
  .gold-divider-bottom span {
    width: 6px; height: 6px;
    border: 1px solid #D4AF37;
    transform: rotate(45deg);
  }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="frame-inner"></div>

  <div class="ornament ornament--tl"></div>
  <div class="ornament ornament--tr"></div>
  <div class="ornament ornament--bl"></div>
  <div class="ornament ornament--br"></div>

  <div class="ring-left"></div>
  <div class="ring-right"></div>

  <div class="diag-line"></div>
  <div class="diag-line"></div>

  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <div class="content">
    <div class="gold-divider-top"><span></span></div>
    <div class="label">WhatsApp Scripts</div>
    <div class="title">
      Protocolo
      <em>Fecha-Tudo</em>
    </div>
    <div class="flourish"><span></span></div>
    <div class="subtitle"><strong>13</strong> Scripts de Vendas para Esteticistas</div>
    <div class="gold-divider-bottom"><span></span></div>
  </div>
</body>
</html>
